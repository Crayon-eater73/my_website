<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blender Projects</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

    <link href="https://cdn.lineicons.com/4.0/lineicons.css" rel="stylesheet">
</head>

<body>

    <!-- HEADER + NAVIGATION -->
    <header>
        <!-- Hamburger Button -->
        <button class="menu-button" aria-label="Open navigation menu">
            <i class="lni lni-menu"></i>
        </button>

        <!-- Sliding Navigation Menu -->
        <nav class="nav-closed" aria-label="Main Navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="html/history.html">History</a></li>
                <li><a href="html/about-us.html">Contact</a></li>
                <li><a href="html/products.html">Products</a></li>
                <li>
                    <a href="https://docs.blender.org/manual/en/latest/interface/tool_system.html" target="_blank">
                        Blender Manual 5.0
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <!-- PAGE CONTENT -->
    <div class="page-content">
        <main>

            <h1>Blender Projects</h1>

            <section aria-labelledby="project-list">
                <h2 id="project-list">Project List</h2>
                <ol>
                    <li>Item Box</li>
                    <li>Arm Flask</li>
                    <li>Umbrella Corporation</li>
                    <li>Goop Juice</li>
                </ol>
            </section>

            <section aria-labelledby="reference-pictures">
                <h2 id="reference-pictures">Reference Pictures</h2>

                <div class="text-box">

                    <figure class="event">
                        <img src="images/references/item-box.png" alt="Item Box">
                        <figcaption class="timestamp">Item Box</figcaption>
                    </figure>

                    <figure class="event">
                        <img src="images/references/show.png" alt="The Arms of Rose">
                        <figcaption class="timestamp">The Arms of Rose</figcaption>
                    </figure>

                    <figure class="event">
                        <img src="images/references/download.jpg" alt="Umbrella Corporation">
                        <figcaption class="timestamp">Umbrella Corporation</figcaption>
                    </figure>

                    <figure class="event">
                        <img src="images/references/first-aid-med.png" alt="Goop Juice">
                        <figcaption class="timestamp">Goop Juice</figcaption>
                    </figure>

                </div>
            </section>

            <section aria-labelledby="finished-products">
                <h2 id="finished-products">Finished Product</h2>

                <div class="text-box">

                    <figure class="event">
                        <img src="images/final/itembox-blender.png" alt="Item Box">
                        <figcaption class="timestamp">Item Box</figcaption>
                    </figure>

                    <figure class="event">
                        <img src="images/final/armflaskrose-blender.png" alt="Arm Flask">
                        <figcaption class="timestamp">Arm Flask</figcaption>
                    </figure>

                    <figure class="event">
                        <img src="images/final/umbrella-blender.png" alt="Umbrella Corporation">
                        <figcaption class="timestamp">Umbrella Corporation</figcaption>
                    </figure>

                    <figure class="event">
                        <img src="images/final/goop-juice-bledner.png" alt="Goop Juice">
                        <figcaption class="timestamp">Goop Juice</figcaption>
                    </figure>

                </div>
            </section>

        </main>
    </div>

    <!-- MOBILE MENU SCRIPT -->
    <script>
        const menuButton = document.querySelector('.menu-button');
        const nav = document.querySelector('nav');

        menuButton.addEventListener('click', () => {
            nav.classList.toggle('nav-open');
            nav.classList.toggle('nav-closed');
        });
    </script>

</body>

</html>
