<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>

    <!-- Google font -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

    <!-- css -->
    <link rel="stylesheet" href="../styles.css">

    <!-- Lineicon -->
    <link href="https://cdn.lineicons.com/4.0/lineicons.css" rel="stylesheet">
</head>

<body>

    <!-- Header and nav -->
    <header>
        <!-- nav Button -->
        <button class="menu-button" aria-label="Open navigation menu">
            <i class="lni lni-menu"></i>
        </button>

        <!-- Sliding nav menu -->
        <nav class="nav-closed" aria-label="Main Navigation">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="../html/history.html">History</a></li>
                <li><a href="../html/about-us.html">Contact</a></li>
                <li><a href="../html/products.html">Products</a></li>
                <li>
                    <a href="https://docs.blender.org/manual/en/latest/interface/tool_system.html" target="_blank">
                        Blender Manual 5.0
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <!-- Page conent -->
    <div class="page-content">

        <main>

            <h1>Products</h1>
            <h3>Click the image to see details</h3>

            <section class="text-box">

                <!-- Item Box -->
                <article class="event">
                    <span class="timestamp">Item-Box</span>
                    <span class="what-is-it">Keychain</span>
                    <a href="../html/item-box.html">
                        <img src="../images/final/itembox-blender.png" alt="Item Box Keychain" width="300">
                    </a>
                </article>

                <!-- Arm Flask -->
                <article class="event">
                    <span class="timestamp">Arm Flask</span>
                    <span class="what-is-it">Keychain</span>
                    <a href="../html/arm-flask.html">
                        <img src="../images/final/armflaskrose-blender.png" alt="Arm Flask Keychain" width="300">
                    </a>
                </article>

                <!-- Umbrella Corporation -->
                <article class="event">
                    <span class="timestamp">Umbrella Corporation</span>
                    <span class="what-is-it">Keychain</span>
                    <a href="../html/umbrella.html">
                        <img src="../images/final/umbrella-blender.png" alt="Umbrella Corporation Keychain" width="300">
                    </a>
                </article>

                <!-- Goop Juice -->
                <article class="event">
                    <span class="timestamp">Goop Juice</span>
                    <span class="what-is-it">Keychain</span>
                    <a href="../html/goop-juice.html">
                        <img src="../images/final/goop-juice-bledner.png" alt="Goop Juice Healing Agent Keychain" width="300">
                    </a>
                </article>

            </section>

        </main>

    </div>

    <!-- Mobile script -->
    <script>
        const menuButton = document.querySelector('.menu-button');
        const nav = document.querySelector('nav');

        menuButton.addEventListener('click', () => {
            nav.classList.toggle('nav-open');
            nav.classList.toggle('nav-closed');
        });
    </script>

</body>

</html>
